kind = "web"
previewPath = "/"
title = "War Cache Solver"
version = "1.0.0"
id = "artifacts/war-cache-solver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22959

[services.development]
run = "pnpm --filter @workspace/war-cache-solver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/war-cache-solver", "run", "build" ]
publicDir = "artifacts/war-cache-solver/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22959"
BASE_PATH = "/"
