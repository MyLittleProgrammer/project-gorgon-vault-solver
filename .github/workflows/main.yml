name: Build and Deploy Vault Solver to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Standard current Node version

      # Navigate into your project folder and install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: ./artifacts/war-cache-solver

      # Run the Vite build command to compile the .tsx into standard JS
      - name: Build project
        run: npm run build
        working-directory: ./artifacts/war-cache-solver

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tell GitHub Pages to ONLY deploy the compiled 'dist' folder
          path: './artifacts/war-cache-solver/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
